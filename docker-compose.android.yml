# Overlay for low-RAM ARM devices (old Android via Linux Deploy / UserLAnd)
# Usage: docker compose -f docker-compose.yml -f docker-compose.android.yml up -d --build

services:
  minecraft:
    environment:
      MEMORY: "1G"
      # Fewer chunks = less CPU/RAM on phones
      VIEW_DISTANCE: "6"
      SIMULATION_DISTANCE: "6"
      MAX_PLAYERS: "5"
    deploy:
      resources:
        limits:
          memory: 1536M

  web:
    deploy:
      resources:
        limits:
          memory: 256M
